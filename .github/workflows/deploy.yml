name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.236.243.109
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Переходим в директорию проекта или клонируем, если её нет
            if [ ! -d "/var/www/bazadanych" ]; then
              mkdir -p /var/www
              cd /var/www
              git clone https://github.com/${{ github.repository }}.git bazadanych
              cd bazadanych
            else
              cd /var/www/bazadanych
              git pull origin main
            fi
            
            # Создаем .env файл если его нет
            if [ ! -f ".env" ]; then
              echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" > .env
              echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            fi
            
            # Перезапускаем контейнеры
            docker compose up -d --build
